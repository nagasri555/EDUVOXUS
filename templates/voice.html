{% extends "base.html" %}
{% block title %}EduVoxus | Voice Practice{% endblock %}

{% block content %}
<div class="container mt-4">
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; backdrop-filter: blur(12px); max-width: 700px; margin: auto;">
        <h3 class="text-center mb-3" style="color: white;">
            <i class="fas fa-microphone-alt" style="color: #c084fc;"></i> Voice Practice
        </h3>
        <p class="text-center" style="color: rgba(255,255,255,0.5);">
            Topic: <strong style="color: white;">{{ topic }}</strong>
        </p>

        <div id="practiceSection">
            <h5 id="questionCounter" class="mt-3" style="color: rgba(255,255,255,0.7);"></h5>
            <p id="questionText" class="fw-semibold" style="color: white; font-size: 1.1rem;">
            </p>
            <button id="bookmarkBtn" onclick="bookmarkCurrentQ()" title="Bookmark this question"
                style="background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 1rem; transition: color 0.3s; margin-bottom: 10px;"
                onmouseover="this.style.color='#fbbf24'" onmouseout="if(!this.classList.contains('done'))this.style.color='rgba(255,255,255,0.3)'">
                <i class="far fa-bookmark"></i> Bookmark
            </button>

            <label class="form-label mt-3" style="color: rgba(255,255,255,0.7);">Your Spoken Answer</label>
            <textarea id="speechText" class="form-control" rows="6" placeholder="Click Start and speak..."
                style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px;"></textarea>

            <div class="text-center mt-4 d-flex gap-3 justify-content-center">
                <button class="btn px-4" style="background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 50px; font-weight: 600;" onclick="startRecording()">
                    <i class="fas fa-microphone"></i> Start
                </button>
                <button class="btn px-4" style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; border-radius: 50px; font-weight: 600;" onclick="stopRecording()">
                    <i class="fas fa-stop"></i> Stop
                </button>
                <button id="nextBtn" class="btn px-4" style="background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; border-radius: 50px; font-weight: 600;" onclick="nextQuestion()">
                    Next <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="resultSection" class="mt-4"></div>
        <p class="text-center mt-3" style="color: rgba(255,255,255,0.4);" id="statusText"></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let questions = {{ questions | tojson }};
let answers = [];
let currentIndex = 0;
let recognition;
let isRecording = false;

function loadQuestion() {
    document.getElementById("questionText").innerText = questions[currentIndex];
    document.getElementById("questionCounter").innerText = `Question ${currentIndex + 1} of ${questions.length}`;

    // Reset bookmark button
    const bmBtn = document.getElementById('bookmarkBtn');
    if (bmBtn) {
        bmBtn.querySelector('i').className = 'far fa-bookmark';
        bmBtn.style.color = 'rgba(255,255,255,0.3)';
        bmBtn.classList.remove('done');
    }

    const nextBtn = document.getElementById("nextBtn");
    if (currentIndex === questions.length - 1) {
        nextBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit';
        nextBtn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
    } else {
        nextBtn.innerHTML = 'Next <i class="fas fa-arrow-right"></i>';
        nextBtn.style.background = 'linear-gradient(135deg, #3b82f6, #2563eb)';
    }
}

loadQuestion();

function startRecording() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert("Speech recognition not supported"); return; }
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onstart = () => { isRecording = true; document.getElementById("statusText").innerText = "Listening..."; };
    recognition.onresult = (event) => {
        let transcript = "";
        for (let i = 0; i < event.results.length; i++) transcript += event.results[i][0].transcript;
        document.getElementById("speechText").value = transcript;
    };
    recognition.start();
}

function stopRecording() {
    if (recognition && isRecording) {
        recognition.stop();
        isRecording = false;
        document.getElementById("statusText").innerText = "Recording stopped";
    }
}

function nextQuestion() {
    stopRecording();
    const answer = document.getElementById("speechText").value.trim();
    if (!answer) { alert("Please answer before continuing"); return; }
    answers.push(answer);
    document.getElementById("speechText").value = "";
    if (currentIndex < questions.length - 1) { currentIndex++; loadQuestion(); }
    else submitAll();
}

function bookmarkCurrentQ() {
    const q = questions[currentIndex];
    fetch('/bookmarks/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, answer: '', topic: "{{ topic }}", source: 'voice' })
    })
    .then(res => res.json())
    .then(() => {
        const btn = document.getElementById('bookmarkBtn');
        btn.querySelector('i').className = 'fas fa-bookmark';
        btn.style.color = '#fbbf24';
        btn.classList.add('done');
    });
}

function esc(text) {
    const d = document.createElement('div');
    d.textContent = String(text);
    return d.innerHTML;
}

function submitAll() {
    document.getElementById("statusText").innerText = "Evaluating your answers...";
    fetch("/voice-evaluate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic: "{{ topic }}", questions: questions, answers: answers })
    })
    .then(res => res.json())
    .then(data => {
        let raw = data.evaluation;
        // Strip markdown code fences if present
        if (raw.startsWith('```')) {
            raw = raw.replace(/^```(?:json)?\s*/, '').replace(/\s*```$/, '');
        }
        let parsed = JSON.parse(raw);
        document.getElementById("practiceSection").style.display = "none";
        document.getElementById("statusText").innerText = "";

        const resultDiv = document.getElementById("resultSection");
        resultDiv.innerHTML = '';

        // Header
        const header = document.createElement('div');
        header.className = 'text-center';
        header.innerHTML = `<h3 style="color: white;">Result</h3><h4 style="color: #60a5fa;">Overall Score: ${esc(parsed.overall_score)}/10</h4>`;
        resultDiv.appendChild(header);

        // Per-question results
        (parsed.results || []).forEach((item, index) => {
            const card = document.createElement('div');
            card.style.cssText = 'background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; margin-top: 12px;';

            const h6 = document.createElement('h6');
            h6.style.color = 'white';
            h6.textContent = `Question ${index + 1}`;
            card.appendChild(h6);

            const scoreP = document.createElement('p');
            scoreP.style.color = 'rgba(255,255,255,0.7)';
            scoreP.innerHTML = `<strong>Score:</strong> ${esc(item.score)}/10`;
            card.appendChild(scoreP);

            const strP = document.createElement('p');
            strP.style.color = 'rgba(255,255,255,0.7)';
            strP.innerHTML = '<strong>Strengths:</strong><br>' + (item.strengths || []).map(s => '- ' + esc(s)).join('<br>');
            card.appendChild(strP);

            const impP = document.createElement('p');
            impP.style.color = 'rgba(255,255,255,0.7)';
            impP.innerHTML = '<strong>Improvements:</strong><br>' + (item.improvements || []).map(s => '- ' + esc(s)).join('<br>');
            card.appendChild(impP);

            resultDiv.appendChild(card);
        });

        // Buttons
        const btns = document.createElement('div');
        btns.className = 'text-center mt-4';
        btns.innerHTML = `
            <a href="/voice?topic={{ topic }}&count=${questions.length}" style="padding: 10px 22px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; margin-right: 10px;">Try Again</a>
            <a href="/mode" style="padding: 10px 22px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; border-radius: 50px; font-weight: 600;">Back to Modes</a>
        `;
        resultDiv.appendChild(btns);
    })
    .catch(() => alert("Evaluation failed. Please try again."));
}
</script>
{% endblock %}
