<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduVoxus | Theory Questions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="about-bg">

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <a class="navbar-brand fw-bold fs-4" href="/">EduVoxus</a>

    <div class="ms-auto">
        <a class="nav-link d-inline mx-4" href="/">Home</a>
        <a class="nav-link d-inline mx-4 text-white" href="/about">About</a>
        <a class="nav-link d-inline mx-4 text-white" href="/dashboard">Dashboard</a>
        <a class="nav-link d-inline mx-4 text-white" href="/contact">Contact</a>

    </div>

</nav>

<div class="container mt-5">
    
    <h3 class="mb-4 text-center">
        📘 Theory Questions on <span class="text-success">{{ topic }}</span>
    </h3>
<!-- ================= QUESTIONS ================= -->
<div id="questionBox" class="card p-4 shadow-lg mx-auto" style="max-width:900px;">
    

    <ol class="fs-5">
        {% for q in questions %}
            <li>{{ q }}</li>
        {% endfor %}
    </ol>


    <div class="text-center mt-4">
        <button class="btn btn-primary px-4" onclick="finishPractice()">
            Finish Practice
        </button>
    </div>
</div>

<!-- ================= RESULT ================= -->
<div id="resultBox" class="card p-5 shadow-lg mt-5 text-center mx-auto"
     style="display:none; max-width:900px;">

    <h2 class="fw-bold mb-2">🎉 Practice Completed</h2>

    <p class="text-muted">
        You have successfully reviewed theory questions on
        <strong>{{ topic }}</strong>.
    </p>

    <h5 class="mt-4">👉 Next, you can try:</h5>
    <ul class="list-unstyled fs-5">
        <li>• Quiz Mode</li>
        <li>• Voice Practice</li>
    </ul>

    <div class="d-flex justify-content-center gap-3 mt-4">
        <button class="btn btn-primary" onclick="practiceAgain()">
            🔁 Practice Again
        </button>
        <a href="/mode" class="btn btn-outline-primary">
            ⬅ Back to Mode
        </a>
    </div>
</div>

</div>

<!-- ================= SCRIPT ================= -->
<script>
function finishPractice() {
    document.getElementById("questionBox").style.display = "none";
    document.getElementById("resultBox").style.display = "block";
}

function practiceAgain() {
    window.location.href = "/start?mode=theory";
}
</script>

</body>
</html>
