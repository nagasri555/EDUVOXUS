<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduVoxus | Contact Us</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        .contact-card {
            border-radius: 20px;
            padding: 40px;
        }
    </style>
</head>

<body class="about-bg">

<!-- 🔹 Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <a class="navbar-brand fw-bold fs-4" href="/">EduVoxus</a>

    <div class="ms-auto">
        <a class="nav-link d-inline mx-4" href="/">Home</a>
        <a class="nav-link d-inline mx-4 text-white" href="/about">About</a>
        <a class="nav-link d-inline mx-4 text-white" href="/dashboard">Dashboard</a>
        <a class="nav-link d-inline mx-4 text-white" href="/contact">Contact</a>

    </div>

</nav>

<div class="container mt-5">

    <!-- PAGE HEADING -->
    <div class="text-center mb-5">
        <h2 class="fw-bold">📩 Contact EduVoxus</h2>
        <p class="text-muted">
            Have questions or feedback? We’d love to hear from you.
        </p>
    </div>

    <!-- CONTACT FORM -->
    <div id="contactFormBox" class="card contact-card shadow-lg">

        <div class="row g-4">

            <div class="col-md-6">
                <label class="form-label fw-semibold">Your Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Subject</label>
                <select class="form-select">
                    <option>General Query</option>
                    <option>Feedback</option>
                    <option>Technical Issue</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold">Message</label>
                <textarea class="form-control" rows="4"
                          placeholder="Write your message here..."></textarea>
            </div>

        </div>

        <div class="text-center mt-4">
            <button class="btn btn-primary px-5" onclick="submitContact()">
                Send Message
            </button>
        </div>

    </div>

    <!-- SUCCESS MESSAGE -->
    <div id="successBox" class="card contact-card shadow-lg text-center mt-5"
         style="display:none">

        <h2 class="fw-bold text-success mb-3">✅ Thank you for contacting EduVoxus!</h2>
        <p class="text-muted fs-5">
            We’ve received your message and will get back to you shortly.
        </p>

        <div class="mt-4">
            <button class="btn btn-success me-2" onclick="location.reload()">
                ✉ Send Another Message
            </button>
            <a href="/" class="btn btn-outline-primary">
                ⬅ Back to Home
            </a>
        </div>

    </div>

</div>

<script>
function submitContact() {
    document.getElementById("contactFormBox").style.display = "none";
    document.getElementById("successBox").style.display = "block";
}
</script>

</body>
</html>
