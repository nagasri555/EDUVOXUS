<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduVoxus | Contact Us</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="about-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand fw-bold fs-4" href="/">EduVoxus</a>

    <div class="ms-auto">
        <a class="nav-link d-inline mx-3" href="/">Home</a>
        <a class="nav-link d-inline mx-3" href="/about">About</a>
        <a class="nav-link d-inline mx-3" href="/dashboard">Dashboard</a>
        <a class="nav-link d-inline mx-3" href="/contact">Contact</a>
    </div>
</nav>

<div class="contact-wrapper">
    <div class="container contact-container">
        <!-- PAGE HEADING -->
        <div class="contact-header">
            <h2 class="contact-title">
                <span class="contact-icon">📩</span>
                <span class="contact-title-text">Contact EduVoxus</span>
            </h2>
            <p class="contact-subtitle">
                Have questions or feedback? We'd love to hear from you.
            </p>
        </div>

        <!-- CONTACT FORM -->
        <div id="contactFormBox" class="card contact-card">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>

                <div class="col-12">
                    <label class="form-label">Subject</label>
                    <select class="form-select">
                        <option>General Query</option>
                        <option>Feedback</option>
                        <option>Technical Issue</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="3" placeholder="Write your message here..."></textarea>
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="contact-btn" onclick="submitContact()">
                    Send Message
                </button>
            </div>
        </div>

        <!-- SUCCESS MESSAGE -->
        <div id="successBox" class="card success-card" style="display:none;">
            <h3 class="text-success fw-bold">✅ Message Sent Successfully</h3>
            <p>Thank you for contacting EduVoxus. We will get back to you shortly.</p>

            <div class="mt-3">
                <button class="success-btn" onclick="sendAnother()">
                    Send Another Message
                </button>
                <a href="/" class="success-btn outline">
                    Back to Home
                </a>
            </div>
        </div>
    </div>
</div>

<script>
function submitContact() {
    document.getElementById("contactFormBox").style.display = "none";
    document.getElementById("successBox").style.display = "block";
}

function sendAnother() {
    document.getElementById("successBox").style.display = "none";
    document.getElementById("contactFormBox").style.display = "block";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
