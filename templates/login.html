<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduVoxus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="about-bg" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>

    <div style="width: 100%; max-width: 420px; padding: 20px; position: relative; z-index: 2;">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="color: white; font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;">EduVoxus</h1>
            <p style="color: rgba(255,255,255,0.5);">Welcome back! Login to continue learning.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div style="padding: 10px 16px; background: {% if category == 'error' %}rgba(239,68,68,0.15){% elif category == 'warning' %}rgba(251,191,36,0.15){% else %}rgba(34,197,94,0.15){% endif %}; color: {% if category == 'error' %}#ef4444{% elif category == 'warning' %}#fbbf24{% else %}#22c55e{% endif %}; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; backdrop-filter: blur(12px);">
            <form method="POST">
                <div style="margin-bottom: 18px;">
                    <label style="color: rgba(255,255,255,0.8); font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.9rem;">
                        <i class="fas fa-envelope" style="color: #60a5fa;"></i> Email
                    </label>
                    <input type="email" name="email" required placeholder="Enter your email"
                        style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; color: white; font-size: 1rem; outline: none;">
                </div>

                <div style="margin-bottom: 22px;">
                    <label style="color: rgba(255,255,255,0.8); font-weight: 600; display: block; margin-bottom: 8px; font-size: 0.9rem;">
                        <i class="fas fa-lock" style="color: #60a5fa;"></i> Password
                    </label>
                    <input type="password" name="password" required placeholder="Enter your password"
                        style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; color: white; font-size: 1rem; outline: none;">
                </div>

                <button type="submit"
                    style="width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #9333ea); color: white; border: none; border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer; box-shadow: 0 10px 25px rgba(96,165,250,0.3);">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
        </div>

        <p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 20px;">
            Don't have an account? <a href="/register" style="color: #60a5fa; text-decoration: none; font-weight: 600;">Register</a>
        </p>
    </div>
</body>
</html>
