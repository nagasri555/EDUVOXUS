{% extends "base.html" %}
{% block title %}{{ code }} | EduVoxus{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 100px); text-align: center;">
    <div>
        <h1 style="font-size: 5rem; font-weight: 800; color: rgba(255,255,255,0.1);">{{ code }}</h1>
        <h2 style="color: white; font-size: 1.5rem; margin-bottom: 10px;">{{ message }}</h2>
        <p style="color: rgba(255,255,255,0.5); margin-bottom: 25px;">Sorry, something went wrong.</p>
        <a href="/" style="padding: 12px 28px; background: linear-gradient(135deg, #3b82f6, #9333ea); color: white; text-decoration: none; border-radius: 50px; font-weight: 600;">
            <i class="fas fa-home"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
